version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3135:3131"
    volumes:
      - ./reports:/root/ecosystems/reports
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - ENV=production

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3002:3000"
    depends_on:
      - backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3135

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: ["python", "worker.py"]
    volumes:
      - ./reports:/root/ecosystems/reports
    restart: unless-stopped
    depends_on:
      - redis
    env_file:
      - .env

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
